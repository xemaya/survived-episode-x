<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>活过第 X 集</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #000;
        overflow: hidden;
        height: 100%;
        font-family: -apple-system, "PingFang SC", sans-serif;
        color: #fff;
      }
      #pixi-root {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #pixi-root canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #ui-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="pixi-root"></div>
    <div id="ui-overlay"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
