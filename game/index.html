<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>活过第 X 集</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #111418; /* matches PixiJS canvas backgroundColor — invisible letterbox on fractional scale */
        overflow: hidden;
        height: 100%;
        font-family: -apple-system, "PingFang SC", sans-serif;
        color: #fff;
      }
      #pixi-root {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #pixi-root canvas {
        /* No image-rendering override — GPU smooth scaling matches the
           texture.scaleMode=linear path for "modern indie pixel art" look. */
      }
      #ui-overlay {
        position: fixed;
        inset: 0;
        display: none; /* mountOverlay sets to flex */
        pointer-events: none;
        align-items: center;
        justify-content: center;
        background: rgba(8, 10, 14, 0.85);
        z-index: 10;
      }
      .menu-root {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        padding: 48px;
        background: #1a1d22;
        border: 2px solid #3a3d42;
        color: #e8e0cc;
        text-align: center;
        box-shadow: 0 0 0 1px #000, 8px 8px 0 #000;
        font-family: -apple-system, "PingFang SC", sans-serif;
      }
      .menu-title {
        font-size: 48px;
        margin: 0;
        letter-spacing: 4px;
        color: #c8a85a;
      }
      .menu-title--small {
        font-size: 32px;
        letter-spacing: 2px;
      }
      .menu-subtitle {
        font-size: 16px;
        margin: 0;
        color: #7a8088;
      }
      .menu-buttons {
        display: flex;
        gap: 12px;
      }
      .menu-button {
        font-size: 20px;
        padding: 12px 32px;
        background: #2c4a6e;
        color: #e8e0cc;
        border: 2px solid #5a7080;
        cursor: pointer;
        font-family: inherit;
        letter-spacing: 2px;
      }
      .menu-button:hover {
        background: #3a5a82;
      }
      .menu-button--primary {
        background: #c8a85a;
        color: #1a1d22;
        border-color: #e0b050;
      }
      .menu-button--primary:hover {
        background: #e0b050;
      }
      .menu-root--recap {
        min-width: 360px;
      }
      .recap-rows {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
        border-top: 1px solid #3a3d42;
        border-bottom: 1px solid #3a3d42;
        padding: 12px 0;
      }
      .recap-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 14px;
        color: #e8e0cc;
      }
      .recap-row--separator {
        border-top: 1px dashed #5a7080;
        padding-top: 8px;
        margin-top: 4px;
      }
      .recap-label {
        color: #7a8088;
        letter-spacing: 1px;
      }
      .recap-value {
        color: #c8a85a;
        font-weight: 600;
      }
      .recap-value em {
        color: #7a8088;
        font-weight: 400;
        font-style: normal;
        font-size: 11px;
      }
      .recap-hint {
        font-size: 11px;
        color: #5a6068;
        margin: 0;
      }
      .menu-root--gameover {
        min-width: 400px;
        background: #2a1f14;
        border-color: #5a3a18;
      }
      .gameover-body {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 24px;
        border: 1px dashed #7a5838;
        background: #1a1206;
        width: 100%;
      }
      .gameover-month {
        font-size: 14px;
        color: #c8a85a;
        margin: 0;
        letter-spacing: 2px;
      }
      .gameover-reason {
        font-size: 13px;
        color: #c4b8a0;
        margin: 0;
        white-space: pre-line;
        text-align: center;
        line-height: 1.6;
      }
      .gameover-stamp {
        font-size: 36px;
        color: #c83428;
        margin: 8px 0 0 0;
        letter-spacing: 6px;
        font-weight: 700;
        border: 3px solid #c83428;
        padding: 8px 24px;
        transform: rotate(-4deg);
        background: rgba(200, 52, 40, 0.05);
      }
      .menu-root--archive { min-width: 480px; max-height: 70vh; overflow-y: auto; }
      .archive-list { list-style: none; padding: 0; margin: 0; width: 100%; }
      .archive-row { padding: 8px; border-bottom: 1px dashed #3a3d42; }
      .archive-row-main { display: flex; gap: 12px; font-size: 12px; }
      .archive-runid { color: #c8a85a; font-weight: 700; }
      .archive-month { color: #e8e0cc; }
      .archive-reason { color: #c83428; }
      .archive-eval { font-size: 11px; color: #c4b8a0; margin: 4px 0; line-height: 1.4; }
      .archive-delete { background: transparent; border: 1px solid #5a3a18; color: #7a5838; font-size: 11px; padding: 2px 8px; cursor: pointer; }
      .archive-delete:hover { color: #c83428; border-color: #c83428; }
      .archive-library { width: 100%; margin-top: 12px; color: #7a8088; font-size: 12px; }
      .archive-library summary { cursor: pointer; padding: 4px 0; }
    </style>
  </head>
  <body>
    <div id="pixi-root"></div>
    <div id="ui-overlay"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
