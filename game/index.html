<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>活过第 X 集</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #000;
        overflow: hidden;
        height: 100%;
        font-family: -apple-system, "PingFang SC", sans-serif;
        color: #fff;
      }
      #pixi-root {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #pixi-root canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #ui-overlay {
        position: fixed;
        inset: 0;
        display: none; /* mountOverlay sets to flex */
        pointer-events: none;
        align-items: center;
        justify-content: center;
        background: rgba(8, 10, 14, 0.85);
        z-index: 10;
      }
      .menu-root {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        padding: 48px;
        background: #1a1d22;
        border: 2px solid #3a3d42;
        color: #e8e0cc;
        text-align: center;
        box-shadow: 0 0 0 1px #000, 8px 8px 0 #000;
        font-family: -apple-system, "PingFang SC", sans-serif;
      }
      .menu-title {
        font-size: 48px;
        margin: 0;
        letter-spacing: 4px;
        color: #c8a85a;
      }
      .menu-title--small {
        font-size: 32px;
        letter-spacing: 2px;
      }
      .menu-subtitle {
        font-size: 16px;
        margin: 0;
        color: #7a8088;
      }
      .menu-buttons {
        display: flex;
        gap: 12px;
      }
      .menu-button {
        font-size: 20px;
        padding: 12px 32px;
        background: #2c4a6e;
        color: #e8e0cc;
        border: 2px solid #5a7080;
        cursor: pointer;
        font-family: inherit;
        letter-spacing: 2px;
      }
      .menu-button:hover {
        background: #3a5a82;
      }
      .menu-button--primary {
        background: #c8a85a;
        color: #1a1d22;
        border-color: #e0b050;
      }
      .menu-button--primary:hover {
        background: #e0b050;
      }
    </style>
  </head>
  <body>
    <div id="pixi-root"></div>
    <div id="ui-overlay"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
