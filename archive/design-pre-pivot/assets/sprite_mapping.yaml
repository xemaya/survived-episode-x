# sprite_mapping.yaml — ASSET-ID ↔ sprite file mapping
#
# Single source of truth. Drives tools/asset_map.py reconciliation against
# design/assets/asset-manifest.md (172 specced) and assets/sprites/ (actual files).
#
# Status values:
#   done         — all spec frames present
#   partial      — some frames present, spec asks for more
#   pending      — not yet generated
#   deferred     — out of MVP scope (VS / Alpha tier / OQ blocked)
#   cross_ref    — covered by another ASSET-ID; see notes
#   not_visual   — config / shader / programmatic / audio (no PNG to map)
#
# Sheet ID refers to the generation sheet that produced these sprites.

